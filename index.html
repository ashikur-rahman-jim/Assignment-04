<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>

    <!-- Add Geist Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Add DaisyUI and Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Add Font Awesome CDN-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>

<body class="bg-[#F8FAFC]">

    <header class="w-[80%] mx-auto">

        <h2 class="my-5 text-3xl font-bold">Job Application Tracker</h2>

        <div class="grid grid-cols-3 gap-4 py-3 border-b border-gray-300">

            <div class="border border-gray-500 rounded-lg p-4 bg-white">
                <p class="font-medium">Total</p>
                <p id="total" class="text-2xl font-bold">0</p>
            </div>

            <div class="border border-gray-500 rounded-lg p-4 bg-white">
                <p class="font-medium">Interview</p>
                <p id="interview" class="text-2xl font-bold text-green-600">0</p>
            </div>

            <div class="border border-gray-500 rounded-lg p-4 bg-white">
                <p class="font-medium">Rejected</p>
                <p id="rejected" class="text-2xl font-bold text-red-600">0</p>
            </div>

        </div>

    </header>

</body>

</html>
